[tool.ruff]
target-version = "py314"
line-length = 88

[tool.mypy]
strict = true
ignore_missing_imports = true
files = ["custom_components/fenstertage"]

[tool.coverage.run]
source = ["custom_components/fenstertage"]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "if TYPE_CHECKING:",
    "raise NotImplementedError",
    "\\.\\.\\.",
]
show_missing = true
skip_empty = true
